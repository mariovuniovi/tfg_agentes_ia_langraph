services:
  # ===========================================================================
  # MLflow Tracking Server (SQLite backend)
  # Access at: http://localhost:5000
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: mlops-mlflow
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --artifacts-destination /mlflow/artifacts
        --serve-artifacts
        --allowed-hosts "mlflow:5000,mlflow,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
    environment:
      TZ: Europe/Madrid
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    networks:
      - mlops-net

  # ===========================================================================
  # FastAPI Backend + LangGraph Agents
  # Access at: http://localhost:8000
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-api
    restart: unless-stopped
    depends_on:
      - mlflow
    env_file:
      - .env
    environment:
      TZ: Europe/Madrid
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./experience_pool:/app/experience_pool
    networks:
      - mlops-net

  # ===========================================================================
  # Next.js Frontend
  # Access at: http://localhost:3000
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: mlops-frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Madrid
    ports:
      - "3000:3000"
    networks:
      - mlops-net

volumes:
  mlflow_data:

networks:
  mlops-net:
    driver: bridge
