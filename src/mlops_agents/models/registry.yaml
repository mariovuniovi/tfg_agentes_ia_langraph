      max_depth: { type: int, low: 3, high: 20 }
      min_samples_split: { type: int, low: 2, high: 20 }
  default_params:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 2
    random_state: 42
    n_jobs: -1

