      max_depth: { type: int, low: 3, high: 10 }
      subsample: { type: float, low: 0.5, high: 1.0 }
  default_params:
    n_estimators: 500
    learning_rate: 0.03
    max_depth: 6
    subsample: 0.9
    random_state: 42
