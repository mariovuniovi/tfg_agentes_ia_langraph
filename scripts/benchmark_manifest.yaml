# Benchmark manifest — 27 datasets across classification, regression, and forecasting.
# source: sklearn | openml | statsmodels | uci_url | yfinance | fred | local
# Forecasting datasets cover single-target rules in ml_rules.yaml (V1: single-target only).

# ---------------------------------------------------------------------------
# Classification (7)
# Rules covered: very_small→simple, large→boosting, severe_imbalance→ensembles
# ---------------------------------------------------------------------------

- dataset_id: iris
  source: sklearn
  source_id: load_iris
  problem_type: classification
  target_column: target
  # 150 rows = very_small → logistic_regression preferred (rule 1)

- dataset_id: wine
  source: sklearn
  source_id: load_wine
  problem_type: classification
  target_column: target
  # 178 rows = very_small, 3 classes

- dataset_id: breast_cancer
  source: sklearn
  source_id: load_breast_cancer
  problem_type: classification
  target_column: target
  # 569 rows = small, binary, balanced

- dataset_id: titanic
  source: openml
  source_id: 40945
  problem_type: classification
  target_column: survived

- dataset_id: adult_income
  source: openml
  source_id: 1590
  problem_type: classification
  target_column: class
  # ~48k rows = large → boosting preferred (rule 10)

- dataset_id: bank_marketing
  source: openml
  source_id: 1461
  problem_type: classification
  target_column: y
  # ~45k rows, ~11% positive = severely_imbalanced → ensembles preferred (rule 6)

- dataset_id: heart_disease
  source: openml
  source_id: 53
  problem_type: classification
  target_column: num

# ---------------------------------------------------------------------------
# Regression (5)
# Rules covered: very_small→ridge, large→boosting
# ---------------------------------------------------------------------------

- dataset_id: california_housing
  source: sklearn
  source_id: fetch_california_housing
  problem_type: regression
  target_column: target
  # ~20k rows = large → boosting preferred (rule 11)

- dataset_id: diabetes
  source: sklearn
  source_id: load_diabetes
  problem_type: regression
  target_column: target
  # 442 rows = very_small → ridge preferred (rule 2)

- dataset_id: bike_sharing
  source: openml
  source_id: 42712
  problem_type: regression
  target_column: cnt

- dataset_id: concrete_strength
  source: local
  source_id: data/benchmarks/concrete_strength.csv
  problem_type: regression
  target_column: compressive_strength

- dataset_id: energy_efficiency
  source: local
  source_id: data/benchmarks/energy_efficiency.csv
  problem_type: regression
  target_column: Y1

# ---------------------------------------------------------------------------
# Forecasting (14) — curated, regime-balanced
# 3 regimes: statistical, supervised, random_walk
# ---------------------------------------------------------------------------

# ── Statistical (4): short/univariate → ETS / AutoARIMA wins ────────────────

- dataset_id: air_passengers
  source: statsmodels
  source_id: air_passengers
  problem_type: forecasting
  target_column: passengers
  datetime_column: month
  series_id_columns: []
  frequency: MS
  forecast_horizon: 12
  expected_family: statistical

- dataset_id: co2_mauna_loa
  source: statsmodels
  source_id: co2
  problem_type: forecasting
  target_column: co2
  datetime_column: date
  series_id_columns: []
  frequency: MS
  forecast_horizon: 6
  expected_family: statistical

- dataset_id: sunspots
  source: statsmodels
  source_id: sunspots
  problem_type: forecasting
  target_column: sunspots
  datetime_column: year
  series_id_columns: []
  frequency: YS
  forecast_horizon: 3
  expected_family: statistical

- dataset_id: nile
  source: statsmodels
  source_id: nile
  problem_type: forecasting
  target_column: volume
  datetime_column: year
  series_id_columns: []
  frequency: YS
  forecast_horizon: 3
  expected_family: statistical

# ── Supervised (5): long history + exog → tree ensembles win ────────────────

# UCI 275 — Bike Sharing daily zip → day.csv (dteday, cnt + weather/calendar exog)
- dataset_id: bike_sharing_daily
  source: uci_url
  source_id: "https://archive.ics.uci.edu/ml/machine-learning-databases/00275/Bike-Sharing-Dataset.zip"
  problem_type: forecasting
  target_column: cnt
  datetime_column: dteday
  series_id_columns: []
  frequency: D
  forecast_horizon: 14
  skip_models: [auto_arima]
  exogenous_columns:
    - { name: temp,       future_availability: unknown_future }
    - { name: hum,        future_availability: unknown_future }
    - { name: windspeed,  future_availability: unknown_future }
    - { name: season,     future_availability: known_future }
    - { name: holiday,    future_availability: known_future }
    - { name: workingday, future_availability: known_future }
    - { name: weekday,    future_availability: known_future }

# metro_traffic_volume removed in pool migration v2 (daily seasonal series;
# structurally overlaps with beijing_pm25 / appliances_energy. Loader retained.)

# beijing_pm25 removed in pool migration v2 (daily seasonal air-quality series with
# unknown-future exog; structurally overlaps bike_sharing_daily/appliances_energy.)

# UCI 374 — Appliances Energy 10-min → hourly (~3,300 rows; lightgbm/xgboost eligible)
- dataset_id: appliances_energy
  source: uci_url
  source_id: "https://archive.ics.uci.edu/ml/machine-learning-databases/00374/energydata_complete.csv"
  problem_type: forecasting
  target_column: Appliances
  datetime_column: date
  series_id_columns: []
  frequency: H
  forecast_horizon: 24
  skip_models: [auto_arima]
  exogenous_columns:
    - { name: T6,          future_availability: unknown_future }
    - { name: RH_6,        future_availability: unknown_future }
    - { name: T_out,       future_availability: unknown_future }
    - { name: RH_out,      future_availability: unknown_future }
    - { name: Windspeed,   future_availability: unknown_future }
    - { name: Visibility,  future_availability: unknown_future }
    - { name: Press_mm_hg, future_availability: unknown_future }

# vic_elec removed in pool migration v2 (half-hourly demand → daily; high-frequency
# industrial series deferred, no structural replacement in this migration. Loader retained.)

# dominicks_cookies removed in pool migration v2 (retail weekly sales; off-domain,
# the only known_future-promo pattern — dropped per human review. Loader retained.)

# ── Random walk (5): near-efficient financial series → naive wins ────────────
# Fixed end: "2024-06-01" ensures reproducible snapshots.

- dataset_id: sp500_weekly
  source: yfinance_multi
  source_id: "^GSPC"
  exog_tickers: ["^VIX", "^TNX", "CL=F", "GC=F", "DX-Y.NYB", "EURUSD=X", "^IXIC"]
  col_names:
    "^GSPC": sp500
    "^VIX": vix
    "^TNX": treasury_10y
    "CL=F": oil_wti
    "GC=F": gold
    "DX-Y.NYB": usd_index
    "EURUSD=X": eurusd
    "^IXIC": nasdaq
  problem_type: forecasting
  target_column: sp500
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  interval: 1wk
  start: "2005-01-01"
  end: "2024-06-01"
  exogenous_columns:
    - { name: vix,          future_availability: unknown_future }
    - { name: treasury_10y, future_availability: unknown_future }
    - { name: oil_wti,      future_availability: unknown_future }
    - { name: gold,         future_availability: unknown_future }
    - { name: usd_index,    future_availability: unknown_future }
    - { name: eurusd,       future_availability: unknown_future }
    - { name: nasdaq,       future_availability: unknown_future }

