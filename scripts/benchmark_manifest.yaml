# Benchmark manifest — 18 datasets across classification, regression, and forecasting.
# source: sklearn | openml | local | yfinance
# Forecasting datasets are designed to cover every rule in ml_rules.yaml.

# ---------------------------------------------------------------------------
# Classification (7)
# Rules covered: very_small→simple, large→boosting, severe_imbalance→ensembles
# ---------------------------------------------------------------------------

- dataset_id: iris
  source: sklearn
  source_id: load_iris
  problem_type: classification
  target_column: target
  # 150 rows = very_small → logistic_regression preferred (rule 1)

- dataset_id: wine
  source: sklearn
  source_id: load_wine
  problem_type: classification
  target_column: target
  # 178 rows = very_small, 3 classes

- dataset_id: breast_cancer
  source: sklearn
  source_id: load_breast_cancer
  problem_type: classification
  target_column: target
  # 569 rows = small, binary, balanced

- dataset_id: titanic
  source: openml
  source_id: 40945
  problem_type: classification
  target_column: survived

- dataset_id: adult_income
  source: openml
  source_id: 1590
  problem_type: classification
  target_column: class
  # ~48k rows = large → boosting preferred (rule 10)

- dataset_id: bank_marketing
  source: openml
  source_id: 1461
  problem_type: classification
  target_column: y
  # ~45k rows, ~11% positive = severely_imbalanced → ensembles preferred (rule 6)

- dataset_id: heart_disease
  source: openml
  source_id: 53
  problem_type: classification
  target_column: num

# ---------------------------------------------------------------------------
