# ── Pool migration v2 — energy/chemical commodity series (FRED keyless CSV) ──
# Real public series, honest provenance. Cover commodity-energy (daily Brent,
# complementing weekly WTI), a petrochemical input (Henry Hub gas), and the
# chemical-sector producer price index (closest public analogue to the target
# domain). Fetched via the keyless fred.stlouisfed.org CSV endpoint.

# EIA Europe Brent Spot (FRED DCOILBRENTEU) — daily, ~3900 business days.
- dataset_id: brent_oil
  source: fred
  source_id: DCOILBRENTEU
  fred_columns: { DCOILBRENTEU: price_usd_bbl }
  problem_type: forecasting
  target_column: price_usd_bbl
  datetime_column: date
  series_id_columns: []
  frequency: B
  forecast_horizon: 30
  start: "2009-06-01"
  end: "2024-06-01"
  exogenous_columns: []

# Henry Hub natural gas spot (FRED MHHNGSP) — monthly, petrochemical input.
- dataset_id: henry_hub_gas
  source: fred
  source_id: MHHNGSP
  fred_columns: { MHHNGSP: price_usd_mmbtu }
  problem_type: forecasting
  target_column: price_usd_mmbtu
  datetime_column: date
  series_id_columns: []
  frequency: MS
  forecast_horizon: 12
  start: "1997-01-01"
  end: "2024-06-01"
  exogenous_columns: []

# PPI Chemical Manufacturing (FRED PCU325325) with IP Chemicals (IPG325S) as an
# unknown-future exogenous companion — closest public analogue to the target domain.
- dataset_id: ppi_chemicals
  source: fred
  source_id: "PCU325325,IPG325S"
  fred_columns: { PCU325325: ppi_index, IPG325S: ip_index }
  problem_type: forecasting
  target_column: ppi_index
  datetime_column: date
  series_id_columns: []
  frequency: MS
  forecast_horizon: 12
  start: "1985-01-01"
  end: "2024-06-01"
  exogenous_columns:
    - { name: ip_index, future_availability: unknown_future }

# Coal API2 CIF ARA futures (Yahoo MTF=F) — thermal coal, a chemical feedstock via
# gasification (coal-to-chemicals: syngas -> methanol/ammonia/olefins). Daily
# multi-exog commodity panel; target is coal (not WTI -> no overlap with oil_weekly).
- dataset_id: coal_feedstock_daily
  source: yfinance_multi
  source_id: MTF=F
  exog_tickers: ["NG=F", "CL=F", "BZ=F", "HG=F", "DX-Y.NYB"]
  col_names: { MTF=F: coal_api2, NG=F: nat_gas, CL=F: wti, BZ=F: brent, HG=F: copper, DX-Y.NYB: usd_index }
  problem_type: forecasting
  target_column: coal_api2
  datetime_column: date
  series_id_columns: []
  frequency: B
  forecast_horizon: 30
  interval: "1d"
  start: "2014-01-01"
  end: "2024-06-01"
  exogenous_columns:
    - { name: nat_gas,   future_availability: unknown_future }
    - { name: wti,       future_availability: unknown_future }
    - { name: brent,     future_availability: unknown_future }
    - { name: copper,    future_availability: unknown_future }
    - { name: usd_index, future_availability: unknown_future }
