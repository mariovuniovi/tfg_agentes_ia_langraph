# Benchmark manifest — 19 datasets across classification, regression, and forecasting.
# source: sklearn | openml | local | yfinance
# Forecasting datasets cover single-target rules in ml_rules.yaml (V1: single-target only).

# ---------------------------------------------------------------------------
# Classification (7)
# Rules covered: very_small→simple, large→boosting, severe_imbalance→ensembles
# ---------------------------------------------------------------------------

- dataset_id: iris
  source: sklearn
  source_id: load_iris
  problem_type: classification
  target_column: target
  # 150 rows = very_small → logistic_regression preferred (rule 1)

- dataset_id: wine
  source: sklearn
  source_id: load_wine
  problem_type: classification
  target_column: target
  # 178 rows = very_small, 3 classes

- dataset_id: breast_cancer
  source: sklearn
  source_id: load_breast_cancer
  problem_type: classification
  target_column: target
  # 569 rows = small, binary, balanced

- dataset_id: titanic
  source: openml
  source_id: 40945
  problem_type: classification
  target_column: survived

- dataset_id: adult_income
  source: openml
  source_id: 1590
  problem_type: classification
  target_column: class
  # ~48k rows = large → boosting preferred (rule 10)

- dataset_id: bank_marketing
  source: openml
  source_id: 1461
  problem_type: classification
  target_column: y
  # ~45k rows, ~11% positive = severely_imbalanced → ensembles preferred (rule 6)

- dataset_id: heart_disease
  source: openml
  source_id: 53
  problem_type: classification
  target_column: num

# ---------------------------------------------------------------------------
# Regression (5)
# Rules covered: very_small→ridge, large→boosting
# ---------------------------------------------------------------------------

- dataset_id: california_housing
  source: sklearn
  source_id: fetch_california_housing
  problem_type: regression
  target_column: target
  # ~20k rows = large → boosting preferred (rule 11)

- dataset_id: diabetes
  source: sklearn
  source_id: load_diabetes
  problem_type: regression
  target_column: target
  # 442 rows = very_small → ridge preferred (rule 2)

- dataset_id: bike_sharing
  source: openml
  source_id: 42712
  problem_type: regression
  target_column: cnt

- dataset_id: concrete_strength
  source: local
  source_id: data/benchmarks/concrete_strength.csv
  problem_type: regression
  target_column: compressive_strength

- dataset_id: energy_efficiency
  source: local
  source_id: data/benchmarks/energy_efficiency.csv
  problem_type: regression
  target_column: Y1

# ---------------------------------------------------------------------------
# Forecasting (4) — single-target datasets covering forecasting rules in ml_rules.yaml
# V1 is single-target only; panel datasets (series_id_columns non-empty) are out of scope.
# Run scripts/_generate_benchmarks.py to create the local CSVs first.
# ---------------------------------------------------------------------------

# Rules 5 + 13: strong seasonality + single series no exog → statistical models
- dataset_id: air_passengers
  source: local
  source_id: data/benchmarks/air_passengers.csv
  problem_type: forecasting
  target_column: passengers
  datetime_column: month
  series_id_columns: []
  frequency: MS
  forecast_horizon: 12

# Rule 4: long history + exogenous variables → supervised ML wins
# Gold price target + Oil, Silver, S&P500, USD as macro exogenous features
- dataset_id: gold_macro_monthly
  source: local
  source_id: data/benchmarks/gold_macro_monthly.csv
  problem_type: forecasting
  target_column: gold_close
  datetime_column: date
  series_id_columns: []
  frequency: MS
  forecast_horizon: 6
  expected_drift: high
  exogenous_columns:
    - { name: oil_close,    future_availability: unknown_future }
    - { name: silver_close, future_availability: unknown_future }
    - { name: sp500_close,  future_availability: unknown_future }
    - { name: usd_close,    future_availability: unknown_future }

# Rule 8: non-stationary + strong trend → AutoARIMA (differencing)
# Bitcoin: highly non-stationary, strongly trending, high volatility
- dataset_id: crypto_weekly
  source: local
  source_id: data/benchmarks/crypto_weekly.csv
  problem_type: forecasting
  target_column: btc_close
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13

# Rule 4 again: exogenous → supervised — FX domain (similar structure to user's dataset)
# EUR/USD target + GBP/USD, JPY/USD, Gold as correlated exogenous signals
- dataset_id: fx_exog_weekly
  source: local
  source_id: data/benchmarks/fx_exog_weekly.csv
  problem_type: forecasting
  target_column: eurusd_close
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  expected_drift: high
  exogenous_columns:
    - { name: gbpusd_close, future_availability: unknown_future }
    - { name: jpyusd_close, future_availability: unknown_future }
    - { name: gold_close,   future_availability: unknown_future }

# ---------------------------------------------------------------------------
# Large exogenous forecasting (3) — ~1000 weekly rows each, 7+ exogenous
# Rule 4 + rule 11: long history + many exogenous → supervised ML beats naive
# ---------------------------------------------------------------------------

# S&P 500 weekly with 7 macro/market exogenous (2005-2024, ~1000 rows)
# Exog: VIX, 10Y Treasury, Oil, Gold, USD index, EUR/USD, Nasdaq
- dataset_id: sp500_macro_weekly
  source: yfinance_multi
  source_id: "^GSPC"
  exog_tickers: ["^VIX", "^TNX", "CL=F", "GC=F", "DX-Y.NYB", "EURUSD=X", "^IXIC"]
  col_names:
    "^GSPC": sp500
    "^VIX": vix
    "^TNX": treasury_10y
    "CL=F": oil_wti
    "GC=F": gold
    "DX-Y.NYB": usd_index
    "EURUSD=X": eurusd
    "^IXIC": nasdaq
  problem_type: forecasting
  target_column: sp500
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  interval: 1wk
  start: "2005-01-01"
  end: "2024-06-01"
  expected_drift: high
  exogenous_columns:
    - { name: vix,          future_availability: unknown_future }
    - { name: treasury_10y, future_availability: unknown_future }
    - { name: oil_wti,      future_availability: unknown_future }
    - { name: gold,         future_availability: unknown_future }
    - { name: usd_index,    future_availability: unknown_future }
    - { name: eurusd,       future_availability: unknown_future }
    - { name: nasdaq,       future_availability: unknown_future }

# WTI crude oil weekly with 7 energy/macro exogenous (2005-2024, ~1000 rows)
