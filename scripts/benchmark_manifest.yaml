# ---------------------------------------------------------------------------
# Forecasting (6) â€” designed to cover every forecasting rule in ml_rules.yaml
# Run scripts/_generate_benchmarks.py to create the local CSVs first.
# ---------------------------------------------------------------------------

# Rules 5 + 13: strong seasonality + single series no exog â†’ statistical models
- dataset_id: air_passengers
  source: local
  source_id: data/benchmarks/air_passengers.csv
  problem_type: forecasting
  target_column: passengers
  datetime_column: month
  series_id_columns: []
  frequency: MS
  forecast_horizon: 12

# Rule 9: many series + medium history â†’ global supervised ML
- dataset_id: m4_monthly_sample
  source: local
  source_id: data/benchmarks/m4_monthly_sample.csv
  problem_type: forecasting
  target_column: value
  datetime_column: date
  series_id_columns: [series_id]
  frequency: MS
  forecast_horizon: 12

# Rule 4: long history + exogenous variables â†’ supervised ML wins
# Gold price target + Oil, Silver, S&P500, USD as macro exogenous features
- dataset_id: gold_macro_monthly
  source: local
  source_id: data/benchmarks/gold_macro_monthly.csv
  problem_type: forecasting
  target_column: gold_close
  datetime_column: date
  series_id_columns: []
  frequency: MS
  forecast_horizon: 6

# Rule 9: moderate panel (5 commodities) + weekly history â†’ global ML
- dataset_id: commodity_panel_weekly
  source: local
  source_id: data/benchmarks/commodity_panel_weekly.csv
  problem_type: forecasting
  target_column: close_price
  datetime_column: week
  series_id_columns: [commodity]
  frequency: W
  forecast_horizon: 13

# Rule 8: non-stationary + strong trend â†’ AutoARIMA (differencing)
# Bitcoin: highly non-stationary, strongly trending, high volatility
- dataset_id: crypto_weekly
  source: local
  source_id: data/benchmarks/crypto_weekly.csv
  problem_type: forecasting
  target_column: btc_close
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13

# Rule 4 again: exogenous â†’ supervised â€” FX domain (similar structure to user's dataset)
# EUR/USD target + GBP/USD, JPY/USD, Gold as correlated exogenous signals
- dataset_id: fx_exog_weekly
  source: local
  source_id: data/benchmarks/fx_exog_weekly.csv
  problem_type: forecasting
  target_column: eurusd_close
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13

# ---------------------------------------------------------------------------
# Large exogenous forecasting (3) â€” ~1000 weekly rows each, 7+ exogenous
# Rule 4 + rule 11: long history + many exogenous â†’ supervised ML beats naive
# ---------------------------------------------------------------------------

# S&P 500 weekly with 7 macro/market exogenous (2005-2024, ~1000 rows)
# Exog: VIX, 10Y Treasury, Oil, Gold, USD index, EUR/USD, Nasdaq
- dataset_id: sp500_macro_weekly
  source: yfinance_multi
  source_id: "^GSPC"
  exog_tickers: ["^VIX", "^TNX", "CL=F", "GC=F", "DX-Y.NYB", "EURUSD=X", "^IXIC"]
  col_names:
    "^GSPC": sp500
    "^VIX": vix
    "^TNX": treasury_10y
    "CL=F": oil_wti
    "GC=F": gold
    "DX-Y.NYB": usd_index
    "EURUSD=X": eurusd
    "^IXIC": nasdaq
  problem_type: forecasting
  target_column: sp500
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  interval: 1wk
  start: "2005-01-01"
  end: "2024-06-01"

# WTI crude oil weekly with 7 energy/macro exogenous (2005-2024, ~1000 rows)
# Exog: Natural Gas, Gasoline, Copper, S&P500, USD, Gold, VIX
- dataset_id: oil_multi_exog_weekly
  source: yfinance_multi
  source_id: "CL=F"
  exog_tickers: ["NG=F", "RB=F", "HG=F", "^GSPC", "DX-Y.NYB", "GC=F", "^VIX"]
  col_names:
    "CL=F": oil_wti
    "NG=F": nat_gas
    "RB=F": gasoline
    "HG=F": copper
    "^GSPC": sp500
    "DX-Y.NYB": usd_index
    "GC=F": gold
    "^VIX": vix
  problem_type: forecasting
  target_column: oil_wti
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  interval: 1wk
  start: "2005-01-01"
  end: "2024-06-01"

# Gold weekly with 7 precious-metals/macro exogenous (2005-2024, ~1000 rows)
# Exog: Silver, Copper, Oil, USD, 10Y Treasury, S&P500, VIX
- dataset_id: gold_multi_exog_weekly
  source: yfinance_multi
  source_id: "GC=F"
  exog_tickers: ["SI=F", "HG=F", "CL=F", "DX-Y.NYB", "^TNX", "^GSPC", "^VIX"]
  col_names:
    "GC=F": gold
    "SI=F": silver
    "HG=F": copper
    "CL=F": oil_wti
    "DX-Y.NYB": usd_index
    "^TNX": treasury_10y
    "^GSPC": sp500
    "^VIX": vix
  problem_type: forecasting
  target_column: gold
  datetime_column: week
  series_id_columns: []
  frequency: W
  forecast_horizon: 13
  interval: 1wk
  start: "2005-01-01"
  end: "2024-06-01"
