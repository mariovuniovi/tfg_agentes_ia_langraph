# Benchmark manifest â€” 18 datasets across classification, regression, and forecasting.
# source: sklearn | openml | local | yfinance
# Forecasting datasets are designed to cover every rule in ml_rules.yaml.

# ---------------------------------------------------------------------------
# Classification (7)
# Rules covered: very_smallâ†’simple, largeâ†’boosting, severe_imbalanceâ†’ensembles
# ---------------------------------------------------------------------------

- dataset_id: iris
  source: sklearn
  source_id: load_iris
  problem_type: classification
  target_column: target
  # 150 rows = very_small â†’ logistic_regression preferred (rule 1)

- dataset_id: wine
  source: sklearn
  source_id: load_wine
  problem_type: classification
  target_column: target
  # 178 rows = very_small, 3 classes

- dataset_id: breast_cancer
  source: sklearn
  source_id: load_breast_cancer
  problem_type: classification
  target_column: target
  # 569 rows = small, binary, balanced

- dataset_id: titanic
