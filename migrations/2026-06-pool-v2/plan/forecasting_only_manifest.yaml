- dataset_id: sp500_weekly
  source: yfinance_multi
  source_id: ^GSPC
  exog_tickers:
  - ^VIX
  - ^TNX
  - CL=F
  - GC=F
  - DX-Y.NYB
  - EURUSD=X
  - ^IXIC
  col_names:
    ^GSPC: sp500
    ^VIX: vix
    ^TNX: treasury_10y
    CL=F: oil_wti
    GC=F: gold
    DX-Y.NYB: usd_index
